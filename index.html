<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tools Dashboard</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333333;
            --accent-color: #2563eb;
            --accent-hover: #1d4ed8;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0f172a;
                --card-bg: #1e293b;
                --text-color: #f8fafc;
                --accent-color: #3b82f6;
                --accent-hover: #60a5fa;
            }
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 2rem 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: var(--shadow);
        }

        h1 {
            font-size: 1.75rem;
            margin-top: 0;
            margin-bottom: 1.5rem;
            text-align: center;
            border-bottom: 2px solid var(--bg-color);
            padding-bottom: 0.75rem;
        }

        .nav-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .nav-item a {
            display: flex;
            align-items: center;
            padding: 1rem;
            background-color: var(--bg-color);
            color: var(--text-color);
            text-decoration: none;
            font-weight: 600;
            border-radius: 8px;
            transition: transform 0.2s ease, background-color 0.2s ease, color 0.2s ease;
            border: 1px solid transparent;
        }

        .nav-item a:hover {
            background-color: var(--accent-color);
            color: #ffffff;
            transform: translateY(-2px);
        }

        .icon {
            margin-right: 0.75rem;
            font-size: 1.25rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Tool Navigator</h1>
        <nav>
            <ul class="nav-list">
                <li class="nav-item">
                    <a href="carousel.html">
                        <span class="icon">🎠</span> Carousel Tool
                    </a>
                </li>
                <li class="nav-item">
                    <a href="exif.html">
                        <span class="icon">📷</span> EXIF Tool
                    </a>
                </li>
                <li class="nav-item">
                    <a href="splitter.html">
                        <span class="icon">🥞</span> Splitter Tool
                    </a>
                </li>
            </ul>
        </nav>
    </div>

</body>
</html>
